# Application
spring.application.name=MultiTenant SaaS POS System
server.port=5000
server.servlet.context-path=/msp

# Database - Updated for Kubernetes
spring.datasource.url=jdbc:postgresql://pos-postgres-postgresql:5432/pos_db
spring.datasource.username=pos_sys
spring.datasource.password=olga
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Redis Configuration
spring.data.redis.host=redis-service
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.shutdown-timeout=100ms

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000  # 1 hour in milliseconds
spring.cache.redis.cache-null-values=false
spring.cache.redis.key-prefix=cache:
spring.cache.redis.use-key-prefix=true

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# In production, you may want to disable Swagger:
# springdoc.api-docs.enabled=false
# springdoc.swagger-ui.enabled=false

# Actuator endpoints for Kubernetes health checks
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Logging
logging.level.com.msp=INFO
logging.level.org.springframework.cache=INFO
logging.level.org.springframework.data.redis=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# JWT (add your JWT configuration)
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation123}
jwt.expiration=86400000

# Server
spring.web.error.include-stacktrace=never
spring.web.error.include-message=always
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s