# ===== APP =====
spring.application.name=MultiTenant SaaS POS System
server.port=5000

# ===== DATABASE (ENV OVERRIDES IN PROD) =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ===== REDIS =====
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis

# ===== ACTUATOR =====
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,mappings
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ===== SWAGGER / OPENAPI =====
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===== IMPORTANT FOR KUBERNETES =====
server.forward-headers-strategy=framework

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

#flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Local dev: use profile "local" (see application-local.properties + docker-compose.yml)
#   .\scripts\start-local.ps1
#   or: mvn spring-boot:run -Dspring-boot.run.profiles=local

# ===== AWS SDK CONFIGURATION =====
aws.region=us-east-1
aws.ses.from-address=noreply@yourdomain.com
aws.s3.bucket-name=msp-tenant-documents
aws.sqs.registration-queue-url=https://sqs.us-east-1.amazonaws.com/123456789012/msp-registration-events.fifo
aws.sqs.notification-queue-url=https://sqs.us-east-1.amazonaws.com/123456789012/msp-notification-events
aws.sns.admin-topic-arn=arn:aws:sns:us-east-1:123456789012:msp-admin-notifications

# LocalStack support for local offline development/testing
aws.localstack.enabled=false
aws.localstack.endpoint=http://localhost:4566

# SQS consumer + outbox publisher (enable with local profile or real AWS credentials in prod)
aws.messaging.enabled=false