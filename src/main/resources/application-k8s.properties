# ===== K8S (KUBERNETES CLUSTER) =====
spring.application.name=MultiTenant SaaS POS System

server.port=5000
server.servlet.context-path=/msp

# Kubernetes DNS service names
spring.datasource.url=jdbc:postgresql://pos-postgres-postgresql.pos.svc.cluster.local:5432/pos_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Redis in cluster
spring.data.redis.host=${REDIS_HOST:redis-service}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis

# Actuator for probes
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Swagger off in cluster by default
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000