# Production-specific overrides (Kubernetes / server deployment)

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate

# Redis
spring.data.redis.host=${REDIS_HOST:redis-service}
spring.data.redis.port=${REDIS_PORT:6379}

# Public URL for Swagger "Try it out" requests (no trailing slash)
app.public.base-url=${APP_PUBLIC_BASE_URL:http://localhost:5000}

# ===== SWAGGER / OPENAPI =====
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

# reverse proxy / ingress support
server.forward-headers-strategy=framework

# AWS messaging (enable when real AWS credentials are configured on the server)
aws.messaging.enabled=${AWS_MESSAGING_ENABLED:false}

# Production logging
logging.level.com.msp=WARN

# enable k8s-style probes
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,mappings
management.endpoint.health.probes.enabled=true
