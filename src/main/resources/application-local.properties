spring.datasource.url=jdbc:postgresql://localhost:5432/tenant_pos_sys
spring.datasource.username=postgres
spring.datasource.password=12345

spring.data.redis.host=localhost
spring.data.redis.port=6379

jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation123

# LocalStack (offline AWS)
aws.localstack.enabled=true
aws.localstack.endpoint=http://localhost:4566
aws.region=us-east-1
aws.ses.from-address=noreply@example.com
aws.s3.bucket-name=msp-tenant-documents
aws.sqs.registration-queue-url=http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/msp-registration-events.fifo
aws.sqs.notification-queue-url=http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/msp-notification-events
aws.sns.admin-topic-arn=arn:aws:sns:us-east-1:000000000000:msp-admin-notifications
