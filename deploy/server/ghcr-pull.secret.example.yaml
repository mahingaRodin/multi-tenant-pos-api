# Only needed if your GHCR/Docker registry image is PRIVATE.
# 1. Copy to ghcr-pull.secret.yaml and replace TOKEN
# 2. kubectl apply -f /opt/apps/msp-api/k8s/ghcr-pull.secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull
  namespace: msp
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "YOUR_GITHUB_USERNAME",
          "password": "YOUR_GITHUB_PAT_WITH_read_packages",
          "auth": "BASE64_OF_username:password"
        }
      }
    }
