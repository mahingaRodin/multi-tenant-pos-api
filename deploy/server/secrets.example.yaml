# Copy to /opt/apps/msp-api/secrets/secrets.yaml on the server (never commit real values).
#   kubectl apply -f /opt/apps/msp-api/secrets/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: msp-db-secret
  namespace: msp
type: Opaque
stringData:
  username: CHANGE_ME_db_user
  password: CHANGE_ME_db_password
---
apiVersion: v1
kind: Secret
metadata:
  name: msp-backend-secrets
  namespace: msp
type: Opaque
stringData:
  jwt-secret: CHANGE_ME_use_openssl_rand_hex_32
