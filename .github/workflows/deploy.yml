name: build-and-deploy

on:
  push:
    branches: ["main"]

env:
  IMAGE: headie1/pos-backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Copy latest Kubernetes manifests
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "k8s/*"
          target: "/root/"

      - name: Deploy application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            echo "🚀 Starting deployment..."

            IMAGE_TAG=${{ env.IMAGE }}:${{ github.sha }}

            echo "📦 Deploying image: $IMAGE_TAG"

            cd /root

            echo "📄 Applying Kubernetes manifests..."
            kubectl apply -f k8s/

            echo "🔄 Updating deployment image..."
            kubectl set image deployment/pos-backend \
              pos-backend=$IMAGE_TAG \
              -n pos

            echo "⏳ Waiting for rollout..."
            kubectl rollout status deployment/pos-backend \
              -n pos \
              --timeout=600s

            echo "📊 Deployment status:"
            kubectl get pods -n pos

            echo "✅ Deployment successful"