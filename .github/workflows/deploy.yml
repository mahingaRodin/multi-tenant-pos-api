name: build-and-deploy

on:
  push:
    branches: ["main"]

env:
  IMAGE: headie1/pos-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build (Maven)
        run: mvn -DskipTests clean package

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      # --- NEW STEP ADDED BELOW ---
      - name: Deploy to Kamatera Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "Successfully connected to Kamatera!"
            echo "Deploying to Kamatera..."
            echo "Updating deployment with new image..."
            
            kubectl set image deployment/pos-backend pos-backend=${{ env.IMAGE }}:${{ github.sha }} -n pos
          
            kubectl rollout status deployment/pos-backend -n pos