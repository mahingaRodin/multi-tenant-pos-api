name: build-and-deploy

on:
  push:
    branches: ["main"]

env:
  IMAGE: headie1/pos-backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JAR (skip tests for speed — optional)
        run: mvn -DskipTests clean package

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to Kubernetes Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            echo "🚀 Starting deployment..."

            IMAGE_TAG=${{ env.IMAGE }}:${{ github.sha }}

            echo "📦 Deploying image: $IMAGE_TAG"

            # Apply manifests (safe to run even if unchanged)
            kubectl apply -f /root/k8s/

            # Force update image
            kubectl set image deployment/pos-backend \
              pos-backend=$IMAGE_TAG \
              -n pos

            echo "⏳ Waiting for rollout (this may take time due to DB + Spring Boot startup)..."

            # Increased timeout for Spring Boot + DB + Redis init
            kubectl rollout status deployment/pos-backend \
              -n pos \
              --timeout=600s || {
                echo "❌ Rollout failed or timed out"
                kubectl get pods -n pos -l app=pos-backend
                kubectl describe pod -n pos -l app=pos-backend
                exit 1
              }

            echo "📊 Final pod state:"
            kubectl get pods -n pos -l app=pos-backend

            echo "✅ Deployment successful: $IMAGE_TAG"