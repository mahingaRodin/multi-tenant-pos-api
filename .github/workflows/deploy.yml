name: build-and-deploy

on:
  push:
    branches: ["main"]

env:
  IMAGE: headie1/pos-backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JAR
        run: mvn -DskipTests clean package

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      # Copy latest k8s manifests to server
      - name: Copy Kubernetes manifests
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "k8s/*"
          target: "/root/"

      # Deploy
      - name: Deploy to Kubernetes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            echo "🚀 Starting deployment..."

            IMAGE_TAG=${{ env.IMAGE }}:${{ github.sha }}

            echo "📦 Deploying image: $IMAGE_TAG"

            cd /root

            # Update image dynamically
            sed -i "s|image: .*|image: $IMAGE_TAG|g" k8s/deployment.yaml

            echo "📄 Applying latest manifests from GitHub repo..."

            kubectl apply -f k8s/

            echo "⏳ Waiting for rollout..."

            kubectl rollout status deployment/pos-backend \
              -n pos \
              --timeout=600s

            echo "📊 Final pod state:"
            kubectl get pods -n pos

            echo "✅ Deployment successful"