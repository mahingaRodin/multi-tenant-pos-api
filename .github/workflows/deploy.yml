name: Build and Deploy to K3s

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  APP_ROOT: /opt/apps/msp-api
  NAMESPACE: msp
  SERVER_PORT: "22"
  IMAGE_NAME: msp-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image reference
        id: meta
        run: echo "image=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application JAR
        run: mvn -B clean package -DskipTests

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE: ${{ needs.build-and-push.outputs.image }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify SSH connection
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ env.SERVER_PORT }}
          script: |
            echo "SSH OK — $(whoami)@$(hostname)"
            mkdir -p ${{ env.APP_ROOT }}/k8s ${{ env.APP_ROOT }}/secrets

      - name: Upload deploy scripts (minimal)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ env.SERVER_PORT }}
          source: "deploy/server/deploy.sh,deploy/server/bootstrap.sh,deploy/server/secrets.example.yaml"
          target: "${{ env.APP_ROOT }}"
          strip_components: 2

      - name: Upload Kubernetes manifests (minimal)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ env.SERVER_PORT }}
          source: "k8s/*"
          target: "${{ env.APP_ROOT }}/k8s"
          strip_components: 1

      - name: Deploy latest image on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ env.SERVER_PORT }}
          envs: IMAGE
          script: |
            set -euo pipefail
            sed -i 's/\r$//' ${{ env.APP_ROOT }}/deploy.sh ${{ env.APP_ROOT }}/bootstrap.sh 2>/dev/null || true
            chmod +x ${{ env.APP_ROOT }}/deploy.sh
            IMAGE="${IMAGE}" bash ${{ env.APP_ROOT }}/deploy.sh

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ env.SERVER_PORT }}
          script: |
            kubectl get pods,svc,ingress -n ${{ env.NAMESPACE }}
            curl -sf --connect-timeout 10 http://msp.185.181.10.165.nip.io/actuator/health \
              && echo "Health check OK" \
              || echo "Check Traefik / firewall if URL not reachable"
