name: build-and-deploy

on:
  push:
    branches: ["main"]

env:
  IMAGE: headie1/pos-backend
  K8S_DIR: /root/k8s

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend
        run: mvn -DskipTests clean package

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image (immutable tag only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to server via SSH (NO SCP of k8s files)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}

          script: |
            set -e

            echo "Starting deployment..."

            kubectl set image deployment/pos-backend \
              pos-backend=headie1/pos-backend:${{ github.sha }} \
              -n pos

            kubectl rollout status deployment/pos-backend -n pos --timeout=180s

            kubectl get pods -n pos -l app=pos-backend

            echo "✅ Deployment successful: ${{ github.sha }}"