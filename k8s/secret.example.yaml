# Copy to /opt/apps/msp-api/secrets/secrets.yaml and replace values before first deploy.
# Do NOT commit real secrets to git.
#
#   kubectl apply -f /opt/apps/msp-api/secrets/secrets.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: msp-db-secret
  namespace: msp
  labels:
    app.kubernetes.io/part-of: msp-api
type: Opaque
stringData:
  username: CHANGE_ME_db_user
  password: CHANGE_ME_db_password
---
apiVersion: v1
kind: Secret
metadata:
  name: msp-backend-secrets
  namespace: msp
  labels:
    app.kubernetes.io/part-of: msp-api
type: Opaque
stringData:
  jwt-secret: CHANGE_ME_use_openssl_rand_hex_32
