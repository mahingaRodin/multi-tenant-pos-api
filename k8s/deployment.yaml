apiVersion: apps/v1
kind: Deployment
metadata:
  name: msp-backend
  namespace: msp
  labels:
    app.kubernetes.io/name: msp-backend
    app.kubernetes.io/part-of: msp-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: msp-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: msp-backend
        app.kubernetes.io/part-of: msp-api
    spec:
      containers:
        - name: msp-backend
          image: msp-api:placeholder
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: msp-backend-config
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: msp-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: msp-db-secret
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: msp-backend-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 5000
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
