apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: msp-postgres-pvc
  namespace: msp
  labels:
    app.kubernetes.io/part-of: msp-api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: msp-postgres
  namespace: msp
  labels:
    app.kubernetes.io/name: msp-postgres
    app.kubernetes.io/part-of: msp-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: msp-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: msp-postgres
        app.kubernetes.io/part-of: msp-api
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: msp_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: msp-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: msp-db-secret
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: msp-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: msp-postgres
  namespace: msp
  labels:
    app.kubernetes.io/name: msp-postgres
    app.kubernetes.io/part-of: msp-api
spec:
  selector:
    app.kubernetes.io/name: msp-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
