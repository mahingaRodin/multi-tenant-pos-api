apiVersion: apps/v1
kind: Deployment
metadata:
  name: pos-postgres
  namespace: pos
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
          - name: POSTGRES_DB
            value: pos_db
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: pos-db-secret
                key: username
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: pos-db-secret
                key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
          - name: postgres-data
            emptyDir: { }


---

apiVersion: v1
kind: Service
metadata:
  name: pos-postgres-postgresql
  namespace: pos
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP